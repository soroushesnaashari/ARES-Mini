<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARES Mini</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>ARES Mini</h1>
    <p class="subtitle">Developed by Mohammad Soroush Esnaashari</p>

    <div class="card">
      <label for="question">Question</label>
      <input id="question" type="text" placeholder="Ask something like: What is RAG?" />
      <button onclick="ask()">Ask</button>
    </div>

    <div class="card">
      <h2>Answer</h2>
      <pre id="answerBox">No answer yet.</pre>
    </div>

    <div class="card">
      <h2>Retrieved Document</h2>
      <pre id="docBox">No document yet.</pre>
    </div>

    <div class="card">
      <h2>Scores</h2>
      <pre id="scoreBox">No scores yet.</pre>
    </div>
  </div>

  <script>
    async function ask() {
      const question = document.getElementById("question").value;
      const answerBox = document.getElementById("answerBox");
      const docBox = document.getElementById("docBox");
      const scoreBox = document.getElementById("scoreBox");

      answerBox.textContent = "Loading...";
      docBox.textContent = "";
      scoreBox.textContent = "";

      const chatRes = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });

      const chatData = await chatRes.json();

      if (!chatRes.ok) {
        answerBox.textContent = "Error: " + (chatData.detail || "Unknown error");
        docBox.textContent = "";
        scoreBox.textContent = "";
        return;
      }

      answerBox.textContent = chatData.answer || "No answer";
      docBox.textContent = (chatData.retrieved_docs || []).join("\n\n") || "No document";

      const evalRes = await fetch("/evaluate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question: chatData.question,
          answer: chatData.answer,
          context: (chatData.retrieved_docs || [""])[0]
        })
      });

      const evalData = await evalRes.json();

      if (!evalRes.ok) {
        scoreBox.textContent = "Error: " + (evalData.detail || "Unknown error");
        return;
      }

      scoreBox.textContent = JSON.stringify(evalData, null, 2);
    }
  </script>
</body>
</html>
